<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e3a5f"/>
  <!-- Dollar coin glow -->
  <circle cx="256" cy="240" r="148" fill="#2563eb"/>
  <circle cx="256" cy="240" r="128" fill="#1d4ed8"/>
  <!-- Dollar sign -->
  <text x="256" y="300" font-family="system-ui, sans-serif" font-size="180" font-weight="800"
    text-anchor="middle" fill="white" opacity="0.95">$</text>
  <!-- Small chart bars at bottom -->
  <rect x="140" y="420" width="36" height="50" rx="6" fill="#3b82f6" opacity="0.8"/>
  <rect x="190" y="400" width="36" height="70" rx="6" fill="#60a5fa" opacity="0.8"/>
  <rect x="240" y="385" width="36" height="85" rx="6" fill="#93c5fd" opacity="0.9"/>
  <rect x="290" y="370" width="36" height="100" rx="6" fill="#bfdbfe"/>
  <rect x="340" y="390" width="36" height="80" rx="6" fill="#60a5fa" opacity="0.8"/>
</svg>
